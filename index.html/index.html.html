<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulario de Descargo</title>

<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.contenedor{
    width:450px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
}

input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    box-sizing:border-box;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}
</style>

</head>
<body>

<div class="contenedor">

    <h2>Formulario de Descargo</h2>

    <form id="formulario">

        <label>Nombre y Apellido</label>
        <input type="text" id="nombre" required>

        <label>Correo Electrónico</label>
        <input type="email" id="email" required>

        <label>Descargo</label>
        <textarea id="descargo" rows="6" required></textarea>

        <div class="g-recaptcha" data-sitekey="6Led3CgtAAAAAMPC8rroU2fWR10vswNCD4wkeuts></div>

        <br>

        <button type="submit">Enviar Descargo</button>

    </form>

</div>

<script>

emailjs.init({
    publicKey: "3wgapSTsUXDoDuzj0"
});

document.getElementById("formulario").addEventListener("submit", function(event)
{
    event.preventDefault();

    let captcha = grecaptcha.getResponse();

    if(captcha.length === 0)
    {
        alert("Debe completar el CAPTCHA.");
        return;
    }

    let parametros =
    {
        name: document.getElementById("nombre").value,
        email: document.getElementById("email").value,
        title: document.getElementById("descargo").value
    };

    emailjs.send(
        "service_7yad1lz",
        "template_akikic7",
        parametros
    )
    .then(function()
    {
        alert("Formulario enviado correctamente.");
        document.getElementById("formulario").reset();
        grecaptcha.reset();
    })
    .catch(function(error)
    {
        console.log(error);
        alert(error.text || JSON.stringify(error));
    });
});

</script>

</body>
</html>
